<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LLD · Pattern Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
  --accent:#4ade80; --accent2:#22c55e;
  --amber:#fbbf24; --blue:#60a5fa;
  --coral:#f87171; --purple:#a78bfa;
  --teal:#2dd4bf; --orange:#fb923c;
  --tr:0.18s ease;
}
[data-theme="dark"] {
  --bg:#0d0f11; --bg2:#13161a; --bg3:#1a1e23;
  --bg4:#1f242b; --bg5:#252b33;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:#e2e4e7; --muted:#4e5666; --muted2:#7a8090;
}
[data-theme="light"] {
  --bg:#f5f4f0; --bg2:#ffffff; --bg3:#f0ede8;
  --bg4:#e8e5df; --bg5:#e0ddd7;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.15);
  --text:#1a1c20; --muted:#9a9fa8; --muted2:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;transition:background var(--tr),color var(--tr);}

/* ── TOPBAR ── */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;height:52px;gap:10px;}
.tb-dot{width:7px;height:7px;border-radius:50%;background:var(--purple);box-shadow:0 0 7px var(--purple);flex-shrink:0;}
.tb-title{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.04em;}
.tb-sep{font-family:var(--mono);color:var(--muted2);font-size:11px;}
.tb-sub{font-family:var(--mono);color:var(--muted2);font-size:11px;}
.tb-right{margin-left:auto;display:flex;gap:7px;align-items:center;}
.icon-btn{height:30px;padding:0 10px;border-radius:5px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;font-family:var(--mono);transition:all .12s;color:var(--muted2);gap:5px;}
.icon-btn:hover{background:var(--bg4);color:var(--text);}

/* ── LAYOUT ── */
.shell{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 52px);}

/* ── SIDEBAR ── */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:16px 0 32px;overflow-y:auto;}
.s-lbl{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;padding:0 16px;margin-bottom:8px;}
.s-sec{margin-bottom:22px;}

.pat-btn{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .12s;width:100%;background:none;border-top:none;border-right:none;border-bottom:none;text-align:left;color:var(--text);}
.pat-btn:hover{background:var(--bg3);}
.pat-btn.active{border-left-color:var(--purple);background:var(--bg3);}
.pat-icon{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.pat-info{flex:1;min-width:0;}
.pat-name{font-family:var(--mono);font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pat-cat{font-family:var(--mono);font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;}
.pat-badge{font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.b-creat{background:rgba(74,222,128,.1);color:var(--accent);border:1px solid rgba(74,222,128,.2);}
.b-struct{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.2);}
.b-behav{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.2);}
.b-modern{background:rgba(45,212,191,.1);color:var(--teal);border:1px solid rgba(45,212,191,.2);}

.progress-row{display:flex;align-items:center;gap:8px;padding:4px 16px;}
.prog-name{font-family:var(--mono);font-size:10px;color:var(--muted2);flex:1;}
.prog-pips{display:flex;gap:3px;}
.pip{width:7px;height:7px;border-radius:50%;background:var(--border);}
.pip.done{background:var(--purple);}

/* ── MAIN ── */
.main{padding:24px 28px;overflow-y:auto;background:var(--bg);}

/* ── TABS ── */
.tab-bar{display:flex;gap:3px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab{font-family:var(--mono);font-size:11px;padding:8px 14px;cursor:pointer;border:none;background:none;color:var(--muted2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;letter-spacing:.02em;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--purple);border-bottom-color:var(--purple);}

/* ── PATTERN HEADER ── */
.pat-header{margin-bottom:20px;}
.pat-title-row{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.pat-h-icon{width:38px;height:38px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.pat-h-name{font-family:var(--mono);font-size:20px;font-weight:600;}
.pat-h-type{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.08em;}
.pat-h-desc{font-size:13px;color:var(--muted2);max-width:680px;line-height:1.7;}

/* ── CARDS ── */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:16px 18px;margin-bottom:14px;}
.card-title{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.card-title-icon{font-size:12px;}

/* ── ANALOGY CARD ── */
.analogy-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.analogy-item{background:var(--bg4);border:1px solid var(--border);border-radius:5px;padding:12px 14px;}
.a-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.a-val{font-size:12px;color:var(--text);line-height:1.6;}

/* ── MENTAL MODEL ── */
.mm-points{display:flex;flex-direction:column;gap:7px;}
.mm-point{display:flex;gap:10px;align-items:flex-start;}
.mm-num{font-family:var(--mono);font-size:10px;color:var(--purple);font-weight:600;flex-shrink:0;margin-top:2px;}
.mm-text{font-size:12px;color:var(--muted2);line-height:1.6;}
.mm-text strong{color:var(--text);font-weight:500;}

/* ── WHEN TO USE ── */
.trigger-list{display:flex;flex-direction:column;gap:6px;}
.trigger{display:flex;gap:8px;align-items:flex-start;}
.t-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:6px;}
.t-text{font-size:12px;color:var(--muted2);line-height:1.6;}
.t-text strong{color:var(--text);}
.t-avoid .t-dot{background:var(--coral);}

/* ── CODE BLOCK ── */
.code-block{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:14px 16px;font-family:var(--mono);font-size:11px;line-height:1.8;overflow-x:auto;position:relative;}
.code-block pre{margin:0;white-space:pre;}
.code-copy{position:absolute;top:8px;right:8px;font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:3px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted2);cursor:pointer;transition:all .1s;}
.code-copy:hover{color:var(--text);}
.c-kw{color:var(--purple);}
.c-cls{color:var(--blue);}
.c-fn{color:var(--accent);}
.c-str{color:var(--amber);}
.c-cm{color:var(--muted2);font-style:italic;}
.c-dec{color:var(--orange);}
.c-self{color:var(--coral);}

/* ── SOLID CARDS ── */
.solid-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.solid-card{background:var(--bg4);border-radius:5px;padding:12px 14px;border:1px solid var(--border);}
.solid-card.satisfies{border-left:3px solid var(--accent);}
.solid-card.violates{border-left:3px solid var(--coral);}
.solid-card.neutral{border-left:3px solid var(--muted);}
.sc-header{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.sc-pill{font-family:var(--mono);font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.06em;}
.sc-pill.s{background:rgba(74,222,128,.12);color:var(--accent);}
.sc-pill.v{background:rgba(248,113,113,.12);color:var(--coral);}
.sc-pill.n{background:var(--border);color:var(--muted2);}
.sc-name{font-family:var(--mono);font-size:11px;font-weight:500;}
.sc-letter{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--muted);margin-right:2px;}
.sc-body{font-size:11px;color:var(--muted2);line-height:1.6;}
.sc-body strong{color:var(--text);font-weight:500;}
.sc-example{margin-top:7px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:7px 9px;font-family:var(--mono);font-size:10px;color:var(--muted2);line-height:1.6;}
.sc-example .label{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}

/* ── DESIGN CHALLENGE ── */
.challenge-banner{background:var(--bg3);border:1px solid rgba(167,139,250,.2);border-left:3px solid var(--purple);border-radius:6px;padding:14px 16px;margin-bottom:14px;}
.cb-label{font-family:var(--mono);font-size:9px;color:var(--purple);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.cb-title{font-family:var(--mono);font-size:14px;font-weight:500;margin-bottom:6px;}
.cb-desc{font-size:12px;color:var(--muted2);line-height:1.7;}

.reqs-list{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.req{display:flex;gap:10px;align-items:flex-start;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;}
.req-num{font-family:var(--mono);font-size:9px;color:var(--muted);flex-shrink:0;margin-top:2px;width:16px;}
.req-text{font-size:12px;color:var(--muted2);line-height:1.6;}
.req-text strong{color:var(--text);}

.guided-q{background:var(--bg3);border:1px solid rgba(251,191,36,.15);border-radius:5px;padding:12px 14px;margin-bottom:10px;}
.gq-label{font-family:var(--mono);font-size:9px;color:var(--amber);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.gq-text{font-size:13px;color:var(--text);line-height:1.7;}

.struggle-note{font-family:var(--mono);font-size:10px;color:var(--muted2);background:var(--bg4);border:1px solid var(--border);border-radius:4px;padding:9px 11px;line-height:1.7;margin-bottom:14px;}
.struggle-note strong{color:var(--amber);}

.action-row{display:flex;gap:8px;flex-wrap:wrap;}
.abtn{font-family:var(--mono);font-size:11px;font-weight:500;padding:7px 14px;border-radius:4px;cursor:pointer;border:1px solid;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all .12s;white-space:nowrap;}
.btn-purple{background:rgba(167,139,250,.1);color:var(--purple);border-color:rgba(167,139,250,.3);}
.btn-purple:hover{background:rgba(167,139,250,.18);}
.btn-amber{background:rgba(251,191,36,.1);color:var(--amber);border-color:rgba(251,191,36,.3);}
.btn-amber:hover{background:rgba(251,191,36,.18);}
.btn-blue{background:rgba(96,165,250,.1);color:var(--blue);border-color:rgba(96,165,250,.25);}
.btn-blue:hover{background:rgba(96,165,250,.18);}
.btn-ghost{background:none;color:var(--muted2);border-color:var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);}

/* ── TRACE ── */
.trace-steps{display:flex;flex-direction:column;gap:8px;}
.trace-step{display:grid;grid-template-columns:28px 1fr;gap:10px;align-items:flex-start;}
.ts-num{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--purple);background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);border-radius:4px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ts-body{padding-top:2px;}
.ts-title{font-family:var(--mono);font-size:11px;font-weight:500;margin-bottom:2px;}
.ts-desc{font-size:12px;color:var(--muted2);line-height:1.6;}
.ts-code{margin-top:6px;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:7px 10px;font-family:var(--mono);font-size:10px;color:var(--muted2);line-height:1.6;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted2);}
.empty-icon{font-size:32px;margin-bottom:12px;}
.empty-text{font-family:var(--mono);font-size:12px;line-height:1.7;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── PROGRESS DOTS SECTION ── */
.phase-section{margin-bottom:6px;}
.phase-hdr{font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;padding:6px 16px 4px;}

/* fade in */
.view{animation:fadeIn .15s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  /* ── MOBILE RESPONSIVE ── */
  .hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:6px;border-radius:4px;background:none;border:1px solid var(--border2);transition:all .12s;}
  .hamburger:hover{background:var(--bg4);}
  .hamburger span{display:block;width:16px;height:1.5px;background:var(--muted2);border-radius:2px;transition:all .2s;}
  .hamburger.open span:nth-child(1){transform:translateY(5.5px) rotate(45deg);}
  .hamburger.open span:nth-child(2){opacity:0;}
  .hamburger.open span:nth-child(3){transform:translateY(-5.5px) rotate(-45deg);}

  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:998;opacity:0;transition:opacity .2s;pointer-events:none;}
  .sidebar-overlay.open{opacity:1;pointer-events:auto;}

  /* iOS Safari tap fixes */
  a, button, [onclick], .fbtn, .pbtn, .pat-btn, .prow, .pb, .vtab, .tab {
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
  }
  * { -webkit-overflow-scrolling: touch; }
  .main, .sidebar { overflow-y: auto; -webkit-overflow-scrolling: touch; }


  @media(max-width:768px){
    .hamburger{display:flex;}
    .shell{grid-template-columns:1fr;grid-template-rows:52px 1fr;}
    .sidebar{
      position:fixed;top:52px;left:0;bottom:0;width:280px;
      transform:translateX(-100%);transition:transform .25s ease;
      z-index:999;border-right:1px solid var(--border2);
    }
    .sidebar.open{transform:translateX(0);}
    .sidebar-overlay{display:block;}
    .main{padding:14px 14px;}
    .tp-phases{grid-template-columns:1fr!important;}
    .dp-grid{grid-template-columns:1fr!important;}
    .dbg-row{grid-template-columns:1fr!important;}
    .solid-grid{grid-template-columns:1fr!important;}
    .analogy-grid{grid-template-columns:1fr!important;}
    /* problem table — hide less important cols on mobile */
    .pcols{display:none!important;}
    .prow{
      grid-template-columns:1fr auto!important;
      gap:6px!important;
      padding:10px 10px!important;
    }
    .prow > *:not(.pr-title):not(:last-child){display:none!important;}
    .prow > .pr-title{font-size:13px;}
    .prow > :last-child{display:flex!important;}
    .nu-actions{flex-direction:column;gap:5px;}
    .analogy-item{grid-column:1/-1!important;}
    .modal{width:100%!important;max-width:100%!important;margin:0!important;border-radius:0!important;max-height:85vh!important;position:fixed!important;bottom:0!important;left:0!important;transform:translateY(100%)!important;}
    .moverlay.open .modal{transform:translateY(0)!important;}
    .moverlay{align-items:flex-end!important;}
  }

</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-dot"></div>
  <a href="../index.html" style="font-family:var(--mono);font-size:11px;color:var(--muted2);text-decoration:none;letter-spacing:.04em;">prep-index</a>
  <span style="font-family:var(--mono);color:var(--muted2);font-size:11px;"> / </span>
  <span class="tb-title">lld-prep</span>
  <span class="tb-sep"> / </span>
  <span class="tb-sub">pattern-lab</span>
  <div class="tb-right">
      <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    <a class="icon-btn" href="index.html">⇄ Problems dashboard</a>
    <button class="icon-btn" id="theme-btn" onclick="toggleTheme()">🌙 theme</button>
  </div>
</div>

<div class="sidebar-overlay"></div>
<div class="shell">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="s-sec">
      <div class="s-lbl">Creational</div>
      <div id="nav-creat"></div>
    </div>
    <div class="s-sec">
      <div class="s-lbl">Structural</div>
      <div id="nav-struct"></div>
    </div>
    <div class="s-sec">
      <div class="s-lbl">Behavioural</div>
      <div id="nav-behav"></div>
    </div>
    <div class="s-sec">
      <div class="s-lbl">Modern Patterns</div>
      <div id="nav-modern"></div>
    </div>
    <div class="s-sec" style="padding:0 16px;">
      <div style="font-family:var(--mono);font-size:9px;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:6px 8px;line-height:1.6;">
        <strong style="color:var(--accent)">All 20 patterns loaded ✓</strong><br/>
        <span style="color:var(--muted2)">GoF 17 + Modern 3: Repository · CQRS · Event Sourcing</span>
      </div>
    </div>

    <div class="s-sec">
      <div class="s-lbl">Progress</div>
      <div id="progress-list" style="padding:0 16px;display:flex;flex-direction:column;gap:6px;"></div>
    </div>

  </div>

  <!-- MAIN -->
  <div class="main" id="main-area">
    <div class="empty">
      <div class="empty-icon">⬡</div>
      <div class="empty-text">Select a pattern from the sidebar<br/>to begin learning.</div>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const PATTERNS = [
  {
    id:'factory',
    name:'Factory Method',
    category:'creat',
    icon:'🏭',
    tagline:'Delegate object creation to subclasses so the caller never knows the concrete type.',
    analogy:{
      realWorld:'A coffee shop order system — you say "I want a latte", the barista (factory) decides which machine and process to use. You never touch the espresso machine directly.',
      production:'A cloud SDK — you call `Storage.create("s3")` or `Storage.create("gcs")`. You get back a storage object. Which class? You don\'t care. The factory decided.',
      smell:'You find yourself writing `if type == "X": return X() elif type == "Y": return Y()` in multiple places. That if-chain is a factory waiting to be born.',
    },
    mentalModel:[
      {n:'01', text:'<strong>The problem it solves:</strong> you have a family of related classes (S3Storage, GCSStorage, AzureStorage). Code that needs a storage object should not know which one it\'s getting.'},
      {n:'02', text:'<strong>The mechanism:</strong> a Creator class has a factory method. Subclasses override it to return their specific product. The caller uses the Creator\'s interface, never the concrete class.'},
      {n:'03', text:'<strong>The invariant:</strong> caller code never calls a constructor directly. It always asks the factory. This is the whole point.'},
      {n:'04', text:'<strong>Python flavour:</strong> often implemented as a class method or a standalone function that takes a string key and returns an instance. ABCs enforce the interface.'},
    ],
    triggers:[
      {text:'You don\'t know ahead of time which class to instantiate — it depends on config, user input, or runtime state.'},
      {text:'You want to <strong>centralise</strong> object construction logic so it\'s easy to change.'},
      {text:'You\'re writing a library and want callers to extend creation without modifying your code.'},
    ],
    avoids:[
      {text:'Don\'t use it when you only have one concrete class. A factory for one thing is just a function with extra ceremony.'},
      {text:'Don\'t add a factory just because it sounds architectural — if the construction is trivial, it\'s overengineering.'},
    ],
    skeleton:`<span class="c-kw">from</span> <span class="c-cls">abc</span> <span class="c-kw">import</span> ABC, abstractmethod

<span class="c-cm"># ── Product interface ─────────────────────────</span>
<span class="c-kw">class</span> <span class="c-cls">Notifier</span>(ABC):
    <span class="c-dec">@abstractmethod</span>
    <span class="c-kw">def</span> <span class="c-fn">send</span>(<span class="c-self">self</span>, message: str) -> <span class="c-kw">None</span>: ...

<span class="c-cm"># ── Concrete products ──────────────────────────</span>

    skeleton:`<span class="c-kw">from</span> <span class="c-cls">abc</span> <span class="c-kw">import</span> ABC, abstractmethod

<span class="c-kw">class</span> <span class="c-cls">DataService</span>(ABC):
    <span class="c-dec">@abstractmethod</span>
    <span class="c-kw">def</span> <span class="c-fn">fetch</span>(<span class="c-self">self</span>, key: str) -> str: ...

<span class="c-cm"># ── Real subject (expensive) ───────────────────</span>
<span class="c-kw">class</span> <span class="c-cls">RealDataService</span>(<span class="c-cls">DataService</span>):
    <span class="c-kw">def</span> <span class="c-fn">__init__</span>(<span class="c-self">self</span>) -> <span class="c-kw">None</span>:
        print(<span class="c-str">"RealDataService: expensive init"</span>)  <span class="c-cm"># DB conn, etc.</span>

    <span class="c-kw">def</span> <span class="c-fn">fetch</span>(<span class="c-self">self</span>, key: str) -> str:

<span class="c-cm"># ── Caching proxy ──────────────────────────────</span>
<span class="c-kw">class</span> <span class="c-cls">CachingProxy</span>(<span class="c-cls">DataService</span>):
    <span class="c-kw">def</span> <span class="c-fn">__init__</span>(<span class="c-self">self</span>) -> <span class="c-kw">None</span>:
        <span class="c-self">self</span>._real:  Optional[<span class="c-cls">RealDataService</span>] = <span class="c-kw">None</span>  <span class="c-cm"># lazy</span>
        <span class="c-self">self</span>._cache: dict[str, str] = {}

    <span class="c-kw">def</span> <span class="c-fn">fetch</span>(<span class="c-self">self</span>, key: str) -> str:
        <span class="c-kw">if</span> key <span class="c-kw">in</span> <span class="c-self">self</span>._cache:

        <span class="c-kw">return</span> result

<span class="c-cm"># ── Client — only sees DataService ────────────</span>
<span class="c-kw">def</span> <span class="c-fn">run</span>(svc: <span class="c-cls">DataService</span>) -> <span class="c-kw">None</span>:

    print(svc.<span class="c-fn">fetch</span>(<span class="c-str">"user:1"</span>))  <span class="c-cm"># hit  — cache returned</span>

<span class="c-kw">from</span> <span class="c-cls">typing</span> <span class="c-kw">import</span> List

<span class="c-cm"># ── Component interface ────────────────────────</span>
<span class="c-kw">class</span> <span class="c-cls">FileSystemItem</span>(ABC):
    <span class="c-kw">def</span> <span class="c-fn">__init__</span>(<span class="c-self">self</span>, name: str) -> <span class="c-kw">None</span>:

    <span class="c-dec">@abstractmethod</span>
    <span class="c-kw">def</span> <span class="c-fn">display</span>(<span class="c-self">self</span>, indent: int = 0) -> <span class="c-kw">None</span>: ...

<span class="c-cm"># ── Leaf ───────────────────────────────────────</span>
<span class="c-kw">class</span> <span class="c-cls">File</span>(<span class="c-cls">FileSystemItem</span>):
    <span class="c-kw">def</span> <span class="c-fn">__init__</span>(<span class="c-self">self</span>, name: str, size_bytes: int) -> <span class="c-kw">None</span>:
        <span class="c-kw">super</span>().__init__(name)
        <span class="c-self">self</span>._size = size_bytes

    <span class="c-kw">def</span> <span class="c-fn">size</span>(<span class="c-self">self</span>) -> int:

    <span class="c-kw">def</span> <span class="c-fn">display</span>(<span class="c-self">self</span>, indent: int = 0) -> <span class="c-kw">None</span>:

<span class="c-cm"># ── Composite ──────────────────────────────────</span>
<span class="c-kw">class</span> <span class="c-cls">Directory</span>(<span class="c-cls">FileSystemItem</span>):
    <span class="c-kw">def</span> <span class="c-fn">__init__</span>(<span class="c-self">self</span>, name: str) -> <span class="c-kw">None</span>:
        <span class="c-kw">super</span>().__init__(name)
        <span class="c-self">self</span>._children: List[<span class="c-cls">FileSystemItem</span>] = []

    <span class="c-kw">def</span> <span class="c-fn">add</span>(<span class="c-self">self</span>, item: <span class="c-cls">FileSystemItem</span>) -> <span class="c-kw">None</span>:
        <span class="c-self">self</span>._children.append(item)

  {

    category:'behav',
    icon:'⛓',

    skeleton:`<span class="c-kw">from</span> <span class="c-cls">abc</span> <span class="c-kw">import</span> ABC, abstractmethod
<span class="c-kw">from</span> <span class="c-cls">typing</span> <span class="c-kw">import</span> Optional

<span class="c-cm"># ── Handler interface ──────────────────────────</span>
<span class="c-kw">class</span> <span class="c-cls">Handler</span>(ABC):
    <span class="c-kw">def</span> <span class="c-fn">__init__</span>(<span class="c-self">self</span>) -> <span class="c-kw">None</span>:
        <span class="c-self">self</span>._next: Optional[<span class="c-str">"Handler"</span>] = <span class="c-kw">None</span>

    <span class="c-kw">def</span> <span class="c-fn">set_next</span>(<span class="c-self">self</span>, handler: <span class="c-str">"Handler"</span>) -> <span class="c-str">"Handler"</span>:
        <span class="c-self">self</span>._next = handler
        <span class="c-kw">return</span> handler   <span class="c-cm"># enables chaining: a.set_next(b).set_next(c)</span>

    <span class="c-kw">def</span> <span class="c-fn">handle</span>(<span class="c-self">self</span>, request: int) -> Optional[str]:
        <span class="c-kw">if</span> <span class="c-self">self</span>._next:
            <span class="c-kw">return</span> <span class="c-self">self</span>._next.<span class="c-fn">handle</span>(request)  <span class="c-cm"># default: pass on</span>
        <span class="c-kw">return</span> <span class="c-kw">None</span>                             <span class="c-cm"># end of chain</span>

<span class="c-cm"># ── Concrete handlers ──────────────────────────</span>
<span class="c-kw">class</span> <span class="c-cls">SmallOrderHandler</span>(<span class="c-cls">Handler</span>):
    <span class="c-kw">def</span> <span class="c-fn">handle</span>(<span class="c-self">self</span>, request: int) -> Optional[str]:
        <span class="c-kw">if</span> request <= 100:
            <span class="c-kw">return</span> <span class="c-str">f"SmallOrder handled {request}"</span>
        <span class="c-kw">return</span> <span class="c-kw">super</span>().<span class="c-fn">handle</span>(request)  <span class="c-cm"># can't handle → pass on</span>

<span class="c-kw">class</span> <span class="c-cls">MediumOrderHandler</span>(<span class="c-cls">Handler</span>):
    <span class="c-kw">def</span> <span class="c-fn">handle</span>(<span class="c-self">self</span>, request: int) -> Optional[str]:
        <span class="c-kw">if</span> request <= 1000:
            <span class="c-kw">return</span> <span class="c-str">f"MediumOrder handled {request}"</span>
        <span class="c-kw">return</span> <span class="c-kw">super</span>().<span class="c-fn">handle</span>(request)

<span class="c-kw">class</span> <span class="c-cls">LargeOrderHandler</span>(<span class="c-cls">Handler</span>):
    <span class="c-kw">def</span> <span class="c-fn">handle</span>(<span class="c-self">self</span>, request: int) -> Optional[str]:
        <span class="c-kw">return</span> <span class="c-str">f"LargeOrder handled {request}"</span>  <span class="c-cm"># always handles — tail</span>

<span class="c-cm"># ── Build the chain ────────────────────────────</span>
small = <span class="c-cls">SmallOrderHandler</span>()
small.<span class="c-fn">set_next</span>(<span class="c-cls">MediumOrderHandler</span>()).<span class="c-fn">set_next</span>(<span class="c-cls">LargeOrderHandler</span>())

print(small.<span class="c-fn">handle</span>(50))    <span class="c-cm"># SmallOrder handles</span>
print(small.<span class="c-fn">handle</span>(500))   <span class="c-cm"># MediumOrder handles</span>
print(small.<span class="c-fn">handle</span>(5000))  <span class="c-cm"># LargeOrder handles</span>`,
    trace:[

      {n:'2', title:'`handle(500)` passes through Small', desc:'500 > 100 — SmallOrderHandler calls `super().handle(500)` which calls `self._next.handle(500)` → MediumOrderHandler.'},
      {n:'3', title:'MediumOrderHandler handles 500', desc:'500 <= 1000 — MediumOrderHandler handles it. Returns. LargeOrderHandler never called.'},
      {n:'4', title:'`handle(5000)` reaches LargeOrderHandler', desc:'Passes through Small, passes through Medium, arrives at Large which always handles. Chain configurability: reordering or inserting a handler requires zero changes to individual handler classes.'},
    ],
    solid:[
      {letter:'S', name:'Single Responsibility', status:'satisfies', body:'Each handler has one responsibility: decide whether to handle this request and what to do with it. The chain-linking logic is in the base Handler class, not scattered across handlers.', example:'Adding fraud detection = new FraudHandler class. Existing handlers untouched.'},
      {letter:'O', name:'Open / Closed', status:'satisfies', body:'New handler = new class. The chain is reconfigured at startup. No existing handler is modified to accommodate the new one.', example:'Inserting a LoggingHandler between Small and Medium = two set_next() changes at the wiring point. Zero class changes.'},
      {letter:'L', name:'Liskov Substitution', status:'satisfies', body:'Every handler must respect the contract: either return a result or call super().handle() to pass on. A handler that both handles AND returns a result AND calls next would break chain semantics.', example:'A handler that always returns without calling next — even when it can\'t handle — swallows requests silently. LSP violation.'},

      {letter:'D', name:'Dependency Inversion', status:'satisfies', body:'Each handler depends on the Handler abstraction for its _next reference. It never imports a concrete handler type. Chain is wired at the top level.', example:'SmallOrderHandler._next is typed as Optional[Handler] — never Optional[MediumOrderHandler].'},

    name:'Template Method',

    skeleton:`<span class="c-kw">from</span> <span class="c-cls">abc</span> <span class="c-kw">import</span> ABC, abstractmethod

<span class="c-cm"># ── Abstract class with template method ────────</span>
<span class="c-kw">class</span> <span class="c-cls">DataPipeline</span>(ABC):

        data = <span class="c-self">self</span>.<span class="c-fn">transform</span>(raw)
        <span class="c-self">self</span>.<span class="c-fn">load</span>(data)
        <span class="c-self">self</span>.<span class="c-fn">on_complete</span>()   <span class="c-cm"># hook — optional, has default impl</span>

<span class="c-cm"># ── Concrete subclass ──────────────────────────</span>

<span class="c-kw">class</span> <span class="c-cls">APIToS3Pipeline</span>(<span class="c-cls">DataPipeline</span>):
    <span class="c-kw">def</span> <span class="c-fn">extract</span>(<span class="c-self">self</span>) -> list:

<span class="c-cm"># ── Usage ──────────────────────────────────────</span>
<span class="c-cls">CSVToPostgresPipeline</span>().<span class="c-fn">run</span>()  <span class="c-cm"># sequence: extract→transform→load→on_complete</span>

  {

    const bc = cat === 'creat' ? 'b-creat' : cat === 'struct' ? 'b-struct' : cat === 'modern' ? 'b-modern' : 'b-behav';
    const catLabel = cat === 'creat' ? 'Creational' : cat === 'struct' ? 'Structural' : cat === 'modern' ? 'Modern' : 'Behavioural';
    const active = currentPattern && currentPattern.id === p.id ? 'active' : '';
    return `<button class="pat-btn ${active}" onclick="selectPattern('${p.id}')">
      <div class="pat-icon">${p.icon}</div>
      <div class="pat-info">
        <div class="pat-name">${p.name}</div>
        <div class="pat-cat">${catLabel}</div>
      </div>
      <span class="pat-badge ${bc}">${catLabel}</span>
    </button>`;
  }).join('');
}

function renderProgress() {
  const el = document.getElementById('progress-list');
  el.innerHTML = PATTERNS.map(p => {
    const tabs = ['learn','skeleton','solid','challenge'];
    const done = tabs.filter(t => progress[p.id + ':' + t]).length;
    const pips = tabs.map(t => `<div class="pip ${progress[p.id+':'+t] ? 'done' : ''}"></div>`).join('');
    return `<div class="progress-row">
      <span class="prog-name">${p.icon} ${p.name}</span>
      <div class="prog-pips">${pips}</div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
// PATTERN SELECT
// ─────────────────────────────────────────────
function selectPattern(id) {
  currentPattern = PATTERNS.find(p => p.id === id);
  currentTab = 'learn';
  renderAll();
}

function renderAll() {
  if (!currentPattern) return;
  renderNav('creat', document.getElementById('nav-creat'));
  renderNav('struct', document.getElementById('nav-struct'));
  renderNav('behav', document.getElementById('nav-behav'));
  renderNav('modern', document.getElementById('nav-modern'));
  renderProgress();

  const main = document.getElementById('main-area');
  const p = currentPattern;
  const typeClass = p.category === 'creat' ? 'b-creat' : p.category === 'struct' ? 'b-struct' : p.category === 'modern' ? 'b-modern' : 'b-behav';
  const typeName = p.category === 'creat' ? 'Creational' : p.category === 'struct' ? 'Structural' : p.category === 'modern' ? 'Modern' : 'Behavioural';
  const typeColor = p.category === 'creat' ? 'var(--accent)' : p.category === 'struct' ? 'var(--blue)' : p.category === 'modern' ? 'var(--teal)' : 'var(--amber)';

  const tabs = [
    {id:'learn', label:'① Mental model'},
    {id:'skeleton', label:'② Code skeleton'},
    {id:'solid', label:'③ SOLID mapping'},
    {id:'challenge', label:'④ Design challenge'},
  ];
  const tabHtml = tabs.map(t =>
    `<button class="tab ${currentTab === t.id ? 'active' : ''}" onclick="setTab('${t.id}')">${t.label}</button>`
  ).join('');

  const iconBg = p.category === 'creat' ? 'rgba(74,222,128,.1)' : p.category === 'struct' ? 'rgba(96,165,250,.1)' : 'rgba(251,191,36,.1)';

  main.innerHTML = `
    <div class="view">
      <div class="pat-header">
        <div class="pat-title-row">
          <div class="pat-h-icon" style="background:${iconBg}">${p.icon}</div>
          <span class="pat-h-name">${p.name}</span>
          <span class="pat-h-type ${typeClass}">${typeName}</span>
        </div>
        <div class="pat-h-desc">${p.tagline}</div>
      </div>
      <div class="tab-bar">${tabHtml}</div>
      <div id="tab-content"></div>
    </div>`;

  renderTab();
}

function setTab(tab) {
  currentTab = tab;
  progress[currentPattern.id + ':' + tab] = true;
  save();
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if (t.textContent.includes(tab === 'learn' ? '①' : tab === 'skeleton' ? '②' : tab === 'solid' ? '③' : '④'))
      t.classList.add('active');
  });
  renderProgress();
  renderTab();
}

function renderTab() {
  const el = document.getElementById('tab-content');
  if (!el) return;
  const p = currentPattern;

  if (currentTab === 'learn') {
    el.innerHTML = `
      <div class="card">
        <div class="card-title"><span class="card-title-icon">💡</span>The pattern in plain english</div>
        <div class="analogy-grid">

            <div class="a-label">Real-world analogy</div>
            <div class="a-val">${p.analogy.realWorld}</div>

            <div class="a-label">Production engineering analogy</div>
            <div class="a-val">${p.analogy.production}</div>
          </div>
          <div class="analogy-item" style="grid-column:1/-1">
            <div class="a-label">The smell that tells you it's needed</div>
            <div class="a-val">${p.analogy.smell}</div>
          </div>
        </div>
      </div>

        <div class="card-title"><span class="card-title-icon">✅</span>When to reach for this pattern</div>
        <div class="trigger-list">

      </div>

        <div class="trigger-list">
          ${p.avoids.map(t => `<div class="trigger t-avoid"><div class="t-dot"></div><div class="t-text">${t.text}</div></div>`).join('')}

      </div>

        <button class="abtn btn-purple" onclick="setTab('skeleton')">Next: Code skeleton →</button>
      </div>`;
  }

  else if (currentTab === 'skeleton') {
    el.innerHTML = `
      <div class="card">
        <div class="card-title"><span class="card-title-icon">🐍</span>Canonical Python skeleton — read, don't copy</div>
        <div style="font-size:12px;color:var(--muted2);margin-bottom:10px;line-height:1.7;">
          This is the minimum structure. No business logic, no edge cases. Internalize the shape — every class, every relationship, why each exists.

        </div>

      <div class="card">
        <div class="card-title"><span class="card-title-icon">🔍</span>Step-by-step trace</div>
        <div class="trace-steps">
          ${p.trace.map(t => `
            <div class="trace-step">
              <div class="ts-num">${t.n}</div>
              <div class="ts-body">
                <div class="ts-title">${t.title}</div>
                <div class="ts-desc">${t.desc}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;margin-top:4px;">
        <button class="abtn btn-ghost" onclick="setTab('learn')">← Mental model</button>
        <button class="abtn btn-purple" onclick="setTab('solid')">Next: SOLID mapping →</button>
      </div>`;
  }

  else if (currentTab === 'solid') {
    el.innerHTML = `
      <div class="card">
        <div class="card-title"><span class="card-title-icon">🏛</span>SOLID principle mapping for ${p.name}</div>
        <div style="font-size:12px;color:var(--muted2);margin-bottom:12px;line-height:1.7;">
          For each principle: does this pattern satisfy it, violate it, or is it neutral? Understanding the violations is as important as the satisfactions — you'll be asked to justify these in interviews.

}

// ─────────────────────────────────────────────
// CLAUDE INTEGRATION
// ─────────────────────────────────────────────
function buildClaudePrompt(p) {
  const c = p.challenge;
  return `You are my LLD mentor. I am a senior software engineer learning low-level design. I code in Python.

Pattern I am practising: ${p.name} (${p.category})

Design challenge: ${c.title}

${c.desc}

Requirements:
${c.reqs.map((r, i) => `${i+1}. ${r.text.replace(/<[^>]+>/g,'')}`).join('\n')}

Before I show you my attempt, ask me only this one question and wait:
"${c.guidedQ}"

After I answer and show you my design attempt:
1. Identify conceptual mistakes first, code mistakes second
2. Map my design against SOLID — call out violations explicitly by principle name
3. Call out wrong relationship choices (composition vs inheritance) with consequences
4. Do NOT rewrite my solution — correct the mental model only
5. Flag any un-Pythonic patterns (missing ABCs, wrong use of dataclasses, etc.)`;
}

function iosOpen(url,blank){const a=document.createElement("a");a.href=url;if(blank)a.target="_blank";a.rel="noopener";document.body.appendChild(a);a.click();document.body.removeChild(a);}
function openInClaude(patId) {
  const p = PATTERNS.find(x => x.id === patId);
  if (!p) return;
  const prompt = buildClaudePrompt(p);
  iosOpen(`https://claude.ai/new?q=${encodeURIComponent(prompt, false)}`, '_blank');
}

function copyChallengePrompt(patId) {
  const p = PATTERNS.find(x => x.id === patId);
  if (!p) return;
  navigator.clipboard.writeText(buildClaudePrompt(p)).then(() => {
    const btns = document.querySelectorAll('.abtn');
    btns.forEach(b => {
      if (b.textContent.includes('Copy mentor')) {
        const orig = b.textContent;
        b.textContent = '✓ Copied';
        setTimeout(() => b.textContent = orig, 1800);
      }
    });
  });
}

function copyCode(btn) {
  const pre = btn.parentElement.querySelector('pre');
  const text = pre ? pre.textContent : '';
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ copied';
    setTimeout(() => btn.textContent = orig, 1800);
  });
}

// THEME
// ─────────────────────────────────────────────
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isDark ? '🌙 theme' : '☀️ theme';
}

// BOOT
// ─────────────────────────────────────────────
init();

// Deep-link: lld-pattern-learn.html#factory → auto-select Factory pattern
(function(){
  const hash = window.location.hash.replace('#','');
  if(hash && PATTERNS.find(p => p.id === hash)){
    selectPattern(hash);
  }
})();

// ── MOBILE SIDEBAR ────────────────────────────────────────────────────────────
function initMobileSidebar(){
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.querySelector('.sidebar-overlay');
  if(!sidebar || !overlay) return;

  const btn = document.getElementById('hamburger-btn');
  if(!btn) return;

  function openSidebar(){
    sidebar.classList.add('open');
    overlay.classList.add('open');
    btn.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeSidebar(){
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
    btn.classList.remove('open');
    document.body.style.overflow = '';
  }
  btn.addEventListener('click', () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
  overlay.addEventListener('click', closeSidebar);
  // Close on nav item click (mobile UX)
  sidebar.querySelectorAll('button,a').forEach(el => {
    el.addEventListener('click', () => { if(window.innerWidth <= 768) closeSidebar(); });
  });
}
initMobileSidebar();
